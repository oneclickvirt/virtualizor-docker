name: Build and publish Docker images

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional additional Docker image tag"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_ACCESS_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Prepare image tags
        id: meta
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCKER_HUB_USERNAME: ${{ env.DOCKER_HUB_USERNAME }}
          MANUAL_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          repo_lc="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          images=("ghcr.io/${repo_lc}")

          if [[ -n "${DOCKER_HUB_USERNAME}" ]]; then
            dockerhub_user_lc="$(printf '%s' "${DOCKER_HUB_USERNAME}" | tr '[:upper:]' '[:lower:]')"
            images+=("${dockerhub_user_lc}/virtualizor-docker")
          fi

          tags=()
          is_valid_tag() {
            [[ "$1" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]
          }

          add_tag() {
            local tag="$1"
            local image

            if ! is_valid_tag "$tag"; then
              echo "::error::Invalid Docker image tag: ${tag}"
              exit 1
            fi

            for image in "${images[@]}"; do
              tags+=("${image}:${tag}")
            done
          }

          add_tag "sha-${GITHUB_SHA::12}"

          if [[ "${REF_TYPE}" == "branch" && "${REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            add_tag "latest"
          fi

          if [[ "${REF_TYPE}" == "tag" ]]; then
            add_tag "${REF_NAME}"
          fi

          if [[ -n "${MANUAL_TAG}" ]]; then
            add_tag "${MANUAL_TAG}"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            S6_OVERLAY_VERSION=3.2.3.0
          tags: ${{ steps.meta.outputs.tags }}
